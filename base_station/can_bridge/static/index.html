<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telemetry Config</title>
    <style>
        body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        textarea { width: 100%; height: 500px; font-family: monospace; font-size: 14px; }
        button { margin-top: 8px; padding: 8px 16px; }
        #message { margin-top: 8px; white-space: pre-wrap; }
        .ok  { color: green; }
        .err { color: red; }
    </style>
</head>
<body>
    <h2>Filter Profile Config</h2>
    <textarea id="config"></textarea>
    <br>
    <button onclick="save()">Save</button>
    <div id="message"></div>

    <script>
        const textarea = document.getElementById("config");
        const message = document.getElementById("message");

        fetch("/config")
            .then(r => r.text())
            .then(t => textarea.value = t);

        async function save() {
            const res = await fetch("/config", {
                method: "POST",
                body: textarea.value,
            });
            const text = await res.text();
            message.className = res.ok ? "ok" : "err";
            message.textContent = res.ok ? "Saved." : text;
        }
    </script>
</body>
</html>
