services:
  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  mdns:
    build: ./mdns
    network_mode: host
    restart: unless-stopped

  can_bridge:
    build: ./can_bridge
    depends_on:
      - mosquitto
    restart: unless-stopped
